services:
  postgres:
    image: postgres:16
    container_name: det-dashboard-postgres
    environment:
      POSTGRES_DB: det_dashboard
      POSTGRES_USER: det
      POSTGRES_PASSWORD: det_password
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - ${POSTGRES_DATA_DIR:-./runtime/postgres}:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  minio:
    image: minio/minio:latest
    container_name: det-dashboard-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ${MINIO_DATA_DIR:-./runtime/minio}:/data

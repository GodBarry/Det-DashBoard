services:
  postgres:
    image: docker.io/library/postgres:16
    container_name: det-dashboard-postgres
    environment:
      POSTGRES_DB: det_dashboard
      POSTGRES_USER: det
      POSTGRES_PASSWORD: det_password
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - ./runtime/postgres:/var/lib/postgresql/data:Z,U
      - ./db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U det -d det_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: docker.io/minio/minio:latest
    container_name: det-dashboard-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./runtime/minio:/data:Z,U

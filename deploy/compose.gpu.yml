services:
  app:
    environment:
      TRAINING_WORKER_ENABLED: "true"
      INFERENCE_WORKER_ENABLED: "true"
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

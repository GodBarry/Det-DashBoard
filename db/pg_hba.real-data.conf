# Used only by docker-compose.real-data.yml.
# The copied runtime/postgres directory is treated as the source of truth, so
# this file lets Docker expose it without editing runtime/postgres/pg_hba.conf.
local   all             all                                     trust
host    all             all             127.0.0.1/32            trust
host    all             all             ::1/128                 trust
host    all             all             0.0.0.0/0               trust
host    all             all             ::/0                    trust
local   replication     all                                     trust
host    replication     all             127.0.0.1/32            trust
host    replication     all             ::1/128                 trust
